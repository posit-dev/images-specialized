name: WAML
on:
  workflow_dispatch:

  schedule:
    # Weekly rebuild, to pick up any upstream changes. Runs last in the
    # 04:00 specialized hour because the WAML build is much longer than
    # WGCW (04:15) — putting it later in the hour absorbs the rest of
    # the window before the daily builds start at 07:45.
    - cron: "45 4 * * 0" # At 04:45 on Sunday

  push:
    branches:
      - main


concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI
    # This should be the only action checked as required in the repo settings.
    #
    # This is a meta-job, here to express the conditions we require
    # in order to consider a CI run to be successful.
    if: always()

    runs-on: ubuntu-latest
    permissions: {}
    timeout-minutes: 10
    needs:
      - build

    steps:
      - uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe  # v1.2.2
        id: alls-green
        with:
          jobs: ${{ toJSON(needs) }}
      - if: always() && github.ref == 'refs/heads/main'
        continue-on-error: true
        uses: posit-dev/images-shared/.github/actions/slack-build-notify@main
        with:
          result: ${{ steps.alls-green.outcome }}
          slack-webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}

  matrix:
    name: Image Matrix
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.images.outputs.matrix }}

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Install
        uses: "posit-dev/images-shared/setup-bakery@main"

      - name: Images
        id: images
        env:
          DEV_VERSIONS: "exclude"
          MATRIX_VERSIONS: "exclude"
          IMAGE_NAME: "workbench-for-microsoft-azure-ml"
        run: |
          echo "matrix=$(bakery ci matrix --quiet --dev-versions "$DEV_VERSIONS" --matrix-versions "$MATRIX_VERSIONS" "$IMAGE_NAME" | jq --compact-output .)" >> "$GITHUB_OUTPUT"

  build:
    name: "${{ matrix.img.image }}:${{ matrix.img.version }}"
    permissions:
      contents: read
      packages: write
    needs: matrix
    runs-on: ubuntu-latest-4x
    strategy:
      fail-fast: false
      matrix:
        img: ${{ fromJson(needs.matrix.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Setup bakery
        uses: "posit-dev/images-shared/setup-bakery@main"

      - name: Setup goss
        uses: "posit-dev/images-shared/setup-goss@main"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup docker buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      - name: Build
        env:
          GIT_SHA: ${{ github.sha }}
          IMAGE_NAME: ${{ matrix.img.image }}
          IMAGE_VERSION: ${{ matrix.img.version }}
          DEV_VERSIONS: "exclude"
          MATRIX_VERSIONS: "exclude"
        run: |
          bakery build --load --pull \
            --retry 1 \
            --image-name "^${IMAGE_NAME}$" \
            --image-version "$IMAGE_VERSION" \
            --dev-versions "$DEV_VERSIONS" \
            --matrix-versions "$MATRIX_VERSIONS"

      - name: Test
        env:
          IMAGE_NAME: ${{ matrix.img.image }}
          IMAGE_VERSION: ${{ matrix.img.version }}
          DEV_VERSIONS: "exclude"
          MATRIX_VERSIONS: "exclude"
        run: |
          GOSS_PATH=${GITHUB_WORKSPACE}/tools/goss \
          DGOSS_PATH=${GITHUB_WORKSPACE}/tools/dgoss \
          bakery run dgoss \
            --image-name "^${IMAGE_NAME}$" \
            --image-version "$IMAGE_VERSION" \
            --dev-versions "$DEV_VERSIONS" \
            --matrix-versions "$MATRIX_VERSIONS"

      - name: Push
        # Push images only for merges into main and weekly scheduled re-builds.
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' }}
        env:
          GIT_SHA: ${{ github.sha }}
          IMAGE_NAME: ${{ matrix.img.image }}
          IMAGE_VERSION: ${{ matrix.img.version }}
          DEV_VERSIONS: "exclude"
          MATRIX_VERSIONS: "exclude"
        run: |
          bakery build --push --pull \
            --retry 1 \
            --image-name "^${IMAGE_NAME}$" \
            --image-version "$IMAGE_VERSION" \
            --dev-versions "$DEV_VERSIONS" \
            --matrix-versions "$MATRIX_VERSIONS"
