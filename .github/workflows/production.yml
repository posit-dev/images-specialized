name: Production
on:
  schedule:
    # Weekly rebuild of all images, to pick up any upstream changes.
    - cron: "15 3 * * 0" # At 03:15 on Sunday

  pull_request:

  push:
    branches:
      - main

concurrency:
  # Only cancel in-progress runs for pull_request events, this prevents cancelling workflows against main or tags
  # A pull_request will reuse the same group thus enabling cancelation, all others receive a unique run_id
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

# Security policy: No ${{ }} expressions in `run:` blocks.
# All expression values are assigned to `env:` and referenced as
# shell variables. This prevents script injection from runtime values
# (matrix outputs, secrets) and keeps the rule enforceable by zizmor
# without per-expression exceptions.

jobs:
  ci:
    name: CI
    # This should be the only action checked as required in the repo settings.
    #
    # This is a meta-job, here to express the conditions we require
    # in order to consider a CI run to be successful.
    if: always()

    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - build

    steps:
      - uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}

  matrix:
    name: Image Matrix
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.images.outputs.matrix }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install
        uses: "posit-dev/images-shared/setup-bakery@main"

      - name: Images
        id: images
        env:
          DEV_VERSIONS: "exclude"
          MATRIX_VERSIONS: "exclude"
        run: |
          echo "matrix=$(bakery ci matrix --quiet --dev-versions "$DEV_VERSIONS" --matrix-versions "$MATRIX_VERSIONS" | jq --compact-output .)" >> $GITHUB_OUTPUT

  build:
    name: "${{ matrix.img.image }}:${{ matrix.img.version }}"
    permissions:
      contents: read
      packages: write
      id-token: write
    needs: matrix
    runs-on: ubuntu-latest-4x
    strategy:
      fail-fast: false
      matrix:
        img: ${{ fromJson(needs.matrix.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup bakery
        uses: "posit-dev/images-shared/setup-bakery@main"

      - name: Setup goss
        uses: "posit-dev/images-shared/setup-goss@main"

      - name: Setup QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a  # v4.0.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Authenticate to GCP
        id: gcp-auth
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'schedule' }}
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093  # v3.0.0
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configure Docker for GCP Artifact Registry
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'schedule' }}
        run: |
          gcloud auth configure-docker us-central1-docker.pkg.dev,us-docker.pkg.dev,europe-docker.pkg.dev,asia-docker.pkg.dev --quiet

      - name: Setup docker buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0

      - name: Build
        env:
          GIT_SHA: ${{ github.sha }}
          IMAGE_NAME: ${{ matrix.img.image }}
          IMAGE_VERSION: ${{ matrix.img.version }}
          DEV_VERSIONS: "exclude"
          MATRIX_VERSIONS: "exclude"
          REGISTRY: ghcr.io/${{ github.repository_owner }}
        run: |
          bakery build --load --pull \
            --retry 1 \
            --image-name "^${IMAGE_NAME}$" \
            --image-version "$IMAGE_VERSION" \
            --dev-versions "$DEV_VERSIONS" \
            --matrix-versions "$MATRIX_VERSIONS" \
            --cache-registry "$REGISTRY"

      - name: Test
        env:
          IMAGE_NAME: ${{ matrix.img.image }}
          IMAGE_VERSION: ${{ matrix.img.version }}
          DEV_VERSIONS: "exclude"
          MATRIX_VERSIONS: "exclude"
        run: |
          GOSS_PATH=${GITHUB_WORKSPACE}/tools/goss \
          DGOSS_PATH=${GITHUB_WORKSPACE}/tools/dgoss \
          bakery run dgoss \
            --image-name "^${IMAGE_NAME}$" \
            --image-version "$IMAGE_VERSION" \
            --dev-versions "$DEV_VERSIONS" \
            --matrix-versions "$MATRIX_VERSIONS"

      - name: Push
        # Push images only for merges into main and weekly scheduled re-builds.
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'schedule' }}
        env:
          GIT_SHA: ${{ github.sha }}
          IMAGE_NAME: ${{ matrix.img.image }}
          IMAGE_VERSION: ${{ matrix.img.version }}
          DEV_VERSIONS: "exclude"
          MATRIX_VERSIONS: "exclude"
        run: |
          bakery build --push --pull \
            --retry 1 \
            --image-name "^${IMAGE_NAME}$" \
            --image-version "$IMAGE_VERSION" \
            --dev-versions "$DEV_VERSIONS" \
            --matrix-versions "$MATRIX_VERSIONS"

  clean:
    name: Clean
    if: always() && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    needs:
      - build

    uses: "posit-dev/images-shared/.github/workflows/clean.yml@main"
    with:
      remove-dangling-caches: true
      remove-caches-older-than: 14
      clean-temporary-images: false
