name: WGCW
on:
  workflow_dispatch:

  schedule:
    # Weekly rebuild, to pick up any upstream changes.
    - cron: "15 3 * * 0" # At 03:15 on Sunday

  push:
    branches:
      - main


concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI
    # This should be the only action checked as required in the repo settings.
    #
    # This is a meta-job, here to express the conditions we require
    # in order to consider a CI run to be successful.
    if: always()

    runs-on: ubuntu-latest
    permissions: {}
    timeout-minutes: 10
    needs:
      - build

    steps:
      - uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe  # v1.2.2
        id: alls-green
        with:
          jobs: ${{ toJSON(needs) }}
      - if: always() && github.ref == 'refs/heads/main'
        continue-on-error: true
        uses: posit-dev/images-shared/.github/actions/slack-build-notify@main
        with:
          result: ${{ steps.alls-green.outcome }}
          slack-webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}

  matrix:
    name: Image Matrix
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.images.outputs.matrix }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install
        uses: "posit-dev/images-shared/setup-bakery@main"

      - name: Images
        id: images
        env:
          DEV_VERSIONS: "exclude"
          MATRIX_VERSIONS: "exclude"
          IMAGE_NAME: "workbench-for-google-cloud-workstations"
        run: |
          echo "matrix=$(bakery ci matrix --quiet --dev-versions "$DEV_VERSIONS" --matrix-versions "$MATRIX_VERSIONS" "$IMAGE_NAME" | jq --compact-output .)" >> "$GITHUB_OUTPUT"

  build:
    name: "${{ matrix.img.image }}:${{ matrix.img.version }}"
    permissions:
      contents: read
      packages: write
      id-token: write
    needs: matrix
    runs-on: ubuntu-latest-4x
    strategy:
      fail-fast: false
      matrix:
        img: ${{ fromJson(needs.matrix.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup bakery
        uses: "posit-dev/images-shared/setup-bakery@main"

      - name: Setup goss
        uses: "posit-dev/images-shared/setup-goss@main"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Authenticate to GCP
        id: gcp-auth
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' }}
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093  # v3.0.0
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configure Docker for GCP Artifact Registry
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' }}
        run: |
          gcloud auth configure-docker us-central1-docker.pkg.dev,us-docker.pkg.dev,europe-docker.pkg.dev,asia-docker.pkg.dev --quiet

      - name: Setup docker buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0

      - name: Build
        env:
          GIT_SHA: ${{ github.sha }}
          IMAGE_NAME: ${{ matrix.img.image }}
          IMAGE_VERSION: ${{ matrix.img.version }}
          DEV_VERSIONS: "exclude"
          MATRIX_VERSIONS: "exclude"
          CACHE_REGISTRY: "us-central1-docker.pkg.dev/cloud-workstations-cache"
        run: |
          bakery build --load --pull \
            --retry 1 \
            --image-name "^${IMAGE_NAME}$" \
            --image-version "$IMAGE_VERSION" \
            --dev-versions "$DEV_VERSIONS" \
            --matrix-versions "$MATRIX_VERSIONS" \
            --cache-registry "$CACHE_REGISTRY"

      - name: Test
        env:
          IMAGE_NAME: ${{ matrix.img.image }}
          IMAGE_VERSION: ${{ matrix.img.version }}
          DEV_VERSIONS: "exclude"
          MATRIX_VERSIONS: "exclude"
        run: |
          GOSS_PATH=${GITHUB_WORKSPACE}/tools/goss \
          DGOSS_PATH=${GITHUB_WORKSPACE}/tools/dgoss \
          bakery run dgoss \
            --image-name "^${IMAGE_NAME}$" \
            --image-version "$IMAGE_VERSION" \
            --dev-versions "$DEV_VERSIONS" \
            --matrix-versions "$MATRIX_VERSIONS"

      - name: Push
        # Push images only for merges into main and weekly scheduled re-builds.
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' }}
        env:
          GIT_SHA: ${{ github.sha }}
          IMAGE_NAME: ${{ matrix.img.image }}
          IMAGE_VERSION: ${{ matrix.img.version }}
          DEV_VERSIONS: "exclude"
          MATRIX_VERSIONS: "exclude"
        run: |
          bakery build --push --pull \
            --retry 1 \
            --image-name "^${IMAGE_NAME}$" \
            --image-version "$IMAGE_VERSION" \
            --dev-versions "$DEV_VERSIONS" \
            --matrix-versions "$MATRIX_VERSIONS"
